<style>
:root {
  --purple: #7B5B8D;
  --purple-deep: #5C3D6E;
  --purple-bg: #6B4D7D;
  --bege: #D4A48E;
  --bege-light: #E0B3A1;
  --azul: #80C0FF;
  --white: #ffffff;
  --text: #e8ddf0;
  --muted: #b8a0c8;

}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--purple-bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* HERO — FULL SCREEN */
.hero {
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 24px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(160deg, #8B6B9D 0%, #6B4D7D 40%, #5C3D6E 100%);
}

/* SAVE THE DATE — background watermark */
.hero-watermark {
  position: absolute;
  right: -5%;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--serif);
  font-size: clamp(120px, 22vw, 280px);
  font-weight: 900;
  line-height: 0.85;
  color: rgba(212, 164, 142, 0.12);
  text-transform: uppercase;
  pointer-events: none;
  text-align: right;
  white-space: nowrap;
  z-index: 0;
  user-select: none;
}
.hero-watermark span {
  display: block;
}

/* Subtle animated glow */
.hero::before {
  content: '';
  position: absolute;
  inset: -30%;
  background: radial-gradient(ellipse at 30% 40%, rgba(128, 192, 255, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 60%, rgba(212, 164, 142, 0.06) 0%, transparent 45%);
  animation: glow 12s ease-in-out infinite alternate;
  z-index: 0;
}
@keyframes glow { 0% { transform: scale(1); } 100% { transform: scale(1.08) translate(2%, -1%); } }

/* Content layer */
.hero-content {
  position: relative;
  z-index: 1;
  max-width: 600px;
  width: 100%;
}

/* NB Logo */
.hero-logo {
  width: 220px;
  max-width: 60%;
  height: auto;
  margin-bottom: 40px;
  animation: fadeUp 0.7s ease 0.2s both;
}

/* SAVE THE DATE label */
.std-label {
  font-family: var(--serif);
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 700;
  color: var(--bege);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 20px;
  animation: fadeUp 0.7s ease 0.4s both;
}

/* Date */
.hero-date {
  font-family: var(--serif);
  font-size: clamp(48px, 12vw, 96px);
  font-weight: 900;
  color: var(--azul);
  line-height: 0.9;
  margin-bottom: 4px;
  animation: fadeUp 0.7s ease 0.5s both;
}
.hero-month {
  font-family: var(--sans);
  font-size: clamp(18px, 4vw, 28px);
  font-weight: 800;
  color: var(--white);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 4px;
  animation: fadeUp 0.7s ease 0.6s both;
}
.hero-year {
  font-family: var(--serif);
  font-size: clamp(36px, 8vw, 64px);
  font-weight: 900;
  color: var(--azul);
  line-height: 1;
  margin-bottom: 24px;
  animation: fadeUp 0.7s ease 0.65s both;
}

/* Location */
.hero-location {
  font-family: var(--sans);
  font-size: clamp(13px, 2.5vw, 16px);
  font-weight: 700;
  color: var(--white);
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 48px;
  animation: fadeUp 0.7s ease 0.7s both;
}

/* Countdown */
.countdown {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 48px;
  animation: fadeUp 0.7s ease 0.8s both;
}
.cd-item {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 14px;
  padding: 16px 12px;
  min-width: 72px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.cd-num {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
  margin-bottom: 4px;
}
.cd-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

/* CTA text */
.hero-cta-text {
  font-size: 16px;
  color: var(--text);
  margin-bottom: 20px;
  animation: fadeUp 0.7s ease 0.9s both;
}
.hero-cta-text strong {
  color: var(--white);
}

/* Form placeholder */
.form-area {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 16px;
  padding: 32px 24px;
  max-width: 440px;
  margin: 0 auto;
  animation: fadeUp 0.7s ease 1s both;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.form-area-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--bege-light);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

/* Placeholder form (replace with RD Station embed) */
.form-placeholder {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.form-input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 10px;
  color: var(--white);
  font-family: var(--sans);
  font-size: 15px;
  outline: none;
  transition: all 0.25s;
}
.form-input::placeholder {
  color: var(--muted);
}
.form-input:focus {
  border-color: var(--bege);
  background: rgba(255, 255, 255, 0.12);
}
.form-btn {

  padding: 16px;
  background: var(--bege);
  color: var(--purple-deep);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.25s;
}
.form-btn:hover {
  background: var(--bege-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(212, 164, 142, 0.3);
}
.form-note {
  font-size: 11px;

.rd-form-container .bricks-form input:focus,

.rd-form-container .bricks-form textarea:focus {

.rd-form-container .bricks-form .bricks-form__submit {

.rd-form-container .bricks-form .bricks-form__submit:hover {

.rd-form-container .bricks-form p,

/* Footer strip */
.footer-strip {
  position: relative;
  z-index: 1;
  padding: 24px;

}
.footer-strip img {

.footer-strip-text a {

@keyframes fadeUp {

  to { opacity: 1; transform: translateY(0); }

@media (max-width: 640px) {

<script>
// Countdown to March 13, 2027
function updateCountdown() {
  const target = new Date('2027-03-13T09:00:00-03:00').getTime();
  const now = Date.now();
  const diff = target - now;

  if (diff <= 0) {
    document.getElementById('cd-days').textContent = '0';
    document.getElementById('cd-hours').textContent = '0';
    document.getElementById('cd-mins').textContent = '0';
    document.getElementById('cd-secs').textContent = '0';
    return;
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById('cd-days').textContent = d;
  document.getElementById('cd-hours').textContent = h.toString().padStart(2, '0');
  document.getElementById('cd-mins').textContent = m.toString().padStart(2, '0');
  document.getElementById('cd-secs').textContent = s.toString().padStart(2, '0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
